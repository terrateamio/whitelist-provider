name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          echo "tag=${tag:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: next_version
        run: |
          current="${{ steps.latest_tag.outputs.tag }}"
          current="${current#v}"
          IFS='.' read -r major minor patch <<< "$current"

          # Check commit messages since last tag for version bump signals
          if [ "${{ steps.latest_tag.outputs.tag }}" = "v0.0.0" ]; then
            commits=$(git log --format='%s' HEAD)
          else
            commits=$(git log --format='%s' "${{ steps.latest_tag.outputs.tag }}"..HEAD)
          fi

          if echo "$commits" | grep -qiE '^breaking[ -]change|^feat!|^fix!|^refactor!'; then
            major=$((major + 1)); minor=0; patch=0
          elif echo "$commits" | grep -qiE '^feat'; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi

          echo "version=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${pair%/*}"
            arch="${pair#*/}"
            output="whitelist-provider-${os}-${arch}"
            GOOS="$os" GOARCH="$arch" go build -o "$output" .
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.next_version.outputs.version }}" \
            whitelist-provider-* \
            --generate-notes \
            --title "${{ steps.next_version.outputs.version }}"
